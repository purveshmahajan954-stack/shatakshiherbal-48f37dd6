name = "shatakshi-herbal"
account_id = "939eff0771f34232554e5155088faf84"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Main CF Worker entry — generated by `npm run build:cloudflare`
main = "dist/server/server.js"

# Static assets (JS, CSS, images) served from the build output
[assets]
directory = "dist/client"
binding = "ASSETS"

# ─────────────────────────────────────────────
# Required secrets — set via `wrangler secret put <KEY>` or
# Cloudflare dashboard → Workers & Pages → shatakshi-herbal → Settings → Variables
# ─────────────────────────────────────────────
#   NEON_DATABASE_URL           (Neon postgres connection string — https://neon.tech)
#   RAZORPAY_KEY_ID             (Razorpay key ID)
#   RAZORPAY_KEY_SECRET         (Razorpay key secret)
#   RAZORPAY_WEBHOOK_SECRET     (Razorpay webhook secret)
#   GOOGLE_CLIENT_ID            (Google OAuth client ID)
#   GOOGLE_CLIENT_SECRET        (Google OAuth client secret)
#   FIREBASE_API_KEY            (Firebase Web API key — for phone OTP)
#   ADMIN_PHONE                 (Admin phone number for OTP login, e.g. 8485838126)
#   CKSHIP_AUTH_TOKEN           (CKShip shipping API auth token)
# ─────────────────────────────────────────────

[vars]
NODE_ENV = "production"
