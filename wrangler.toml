name = "shatakshi-herbal"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Main worker entry (generated after `npm run build`)
# main = ".output/server/index.mjs"

# Static assets served from the build output
[assets]
directory = ".output/public"

# Environment variables — set secret values in Cloudflare dashboard
# Dashboard → Workers & Pages → shatakshi-herbal → Settings → Variables
# Required secrets (add via `wrangler secret put <NAME>` or the dashboard):
#   SUPABASE_URL
#   SUPABASE_ANON_KEY
#   SUPABASE_SERVICE_ROLE_KEY
#   RAZORPAY_KEY_ID
#   RAZORPAY_KEY_SECRET
#   RAZORPAY_WEBHOOK_SECRET

[vars]
NODE_ENV = "production"
