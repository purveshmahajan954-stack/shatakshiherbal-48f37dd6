name = "shatakshi-herbal"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Main CF Worker entry — generated by `npm run build`
main = "dist/server/server.js"

# Static assets (JS, CSS, images) served from the build output
[assets]
directory = "dist/client"
binding = "ASSETS"

# ─────────────────────────────────────────────
# Required secrets — set via Cloudflare dashboard or `wrangler secret put`
# Dashboard → Workers & Pages → shatakshi-herbal → Settings → Variables
# ─────────────────────────────────────────────
#   SUPABASE_URL                (your Supabase project URL)
#   SUPABASE_ANON_KEY           (your Supabase anon/public key)
#   SUPABASE_SERVICE_ROLE_KEY   (your Supabase service role key)
#   RAZORPAY_KEY_ID             (Razorpay key ID)
#   RAZORPAY_KEY_SECRET         (Razorpay key secret)
#   RAZORPAY_WEBHOOK_SECRET     (Razorpay webhook secret)
#   NEON_DATABASE_URL           (Neon postgres connection string — if using Neon directly)
# ─────────────────────────────────────────────

[vars]
NODE_ENV = "production"
