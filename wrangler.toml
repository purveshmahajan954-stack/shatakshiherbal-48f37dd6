name = "shatakshi-herbal"
account_id = "939eff0771f34232554e5155088faf84"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Main CF Worker entry — generated by `npm run build`
main = "dist/server/server.js"

# Static assets (JS, CSS, images) served from the build output
[assets]
directory = "dist/client"
binding = "ASSETS"

# ─────────────────────────────────────────────
# Required secrets — set via Cloudflare dashboard or `wrangler secret put`
# Dashboard → Workers & Pages → shatakshi-herbal → Settings → Variables
# ─────────────────────────────────────────────
#   NEON_DATABASE_URL           (Neon postgres connection string — https://neon.tech)
#   RAZORPAY_KEY_ID             (Razorpay key ID)
#   RAZORPAY_KEY_SECRET         (Razorpay key secret)
#   RAZORPAY_WEBHOOK_SECRET     (Razorpay webhook secret)
#   TWILIO_ACCOUNT_SID          (Twilio account SID for OTP SMS)
#   TWILIO_AUTH_TOKEN           (Twilio auth token)
#   TWILIO_PHONE_NUMBER         (Twilio sender phone number e.g. +1XXXXXXXXXX)
#   GOOGLE_CLIENT_ID            (Google OAuth client ID)
#   GOOGLE_CLIENT_SECRET        (Google OAuth client secret)
# ─────────────────────────────────────────────

[vars]
NODE_ENV = "production"
